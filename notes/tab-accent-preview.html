<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>탭 활성 스타일 비교 — wee-log</title>
<style>
  :root{
    --background:0 0% 100%;
    --foreground:25 5% 8%;
    --primary:208 100% 44%;
    --primary-foreground:0 0% 100%;
    --muted:30 9% 96%;
    --muted-foreground:30 4% 37%;
    --border:0 0% 90%;
  }
  *{box-sizing:border-box}
  body{
    margin:0;padding:40px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;
    background:hsl(220 13% 95%);color:hsl(var(--foreground));
  }
  h1{font-size:18px;margin:0 0 4px}
  p.sub{margin:0 0 28px;color:hsl(var(--muted-foreground));font-size:13px}
  .row{display:flex;align-items:center;gap:20px;margin-bottom:18px}
  .label{width:170px;font-size:13px;font-weight:600;flex-shrink:0}
  .label small{display:block;font-weight:400;color:hsl(var(--muted-foreground));font-size:11px;margin-top:2px}
  /* 헤더 모사 */
  .header{
    display:flex;align-items:center;gap:8px;height:48px;padding:0 12px;
    background:hsl(var(--background));border:1px solid hsl(var(--border));border-radius:10px;
    flex:1;min-width:0;
  }
  .bar{display:flex;align-items:center;gap:4px;flex:1;min-width:0;
       background:hsl(var(--muted));border-radius:8px;padding:2px;overflow:hidden}
  .chip{display:flex;align-items:center;gap:4px;border-radius:6px;
        padding:5px 6px 5px 10px;font-size:12px;font-weight:500;white-space:nowrap;cursor:default}
  .chip .x{display:flex;width:16px;height:16px;align-items:center;justify-content:center;border-radius:4px;opacity:.55}
  .chip.inactive{color:hsl(var(--muted-foreground))}
  .plus{display:flex;width:24px;height:24px;align-items:center;justify-content:center;
        border-radius:6px;color:hsl(var(--muted-foreground));flex-shrink:0}
  svg{display:block}

  /* ── V0 현재: 흰 칩 + 그림자 ── */
  .v0 .active{background:hsl(var(--background));color:hsl(var(--foreground));
              box-shadow:0 1px 2px rgba(0,0,0,.12)}
  /* ── V1 솔리드 액센트: 파랑 배경 + 흰 글자 ── */
  .v1 .active{background:hsl(var(--primary));color:hsl(var(--primary-foreground))}
  .v1 .active .x{opacity:.8}
  /* ── V2 틴트 액센트: 연한 파랑 배경 + 파랑 글자 ── */
  .v2 .active{background:hsl(var(--primary) / .12);color:hsl(var(--primary));font-weight:600}
  /* ── V3 하단 인디케이터: 흰 칩 + 파랑 밑줄 + 파랑 글자 ── */
  .v3 .active{background:hsl(var(--background));color:hsl(var(--primary));font-weight:600;
              box-shadow:0 1px 2px rgba(0,0,0,.10);border-bottom:2px solid hsl(var(--primary));
              border-bottom-left-radius:2px;border-bottom-right-radius:2px}
  /* ── V4 텍스트만 액센트: 흰 칩 + 그림자 + 파랑 글자 ── */
  .v4 .active{background:hsl(var(--background));color:hsl(var(--primary));font-weight:600;
              box-shadow:0 1px 2px rgba(0,0,0,.12)}
</style>
</head>
<body>
  <h1>탭 활성 스타일 비교</h1>
  <p class="sub">실제 테마 토큰(<code>--primary: 208 100% 44%</code>) 적용. 가운데 "사례 관리"가 활성 탭.</p>

  <!-- 행 템플릿을 변형별로 반복 -->
  <div class="row v0">
    <div class="label">V0 · 현재<small>흰 칩 + 그림자</small></div>
    <div class="header"><div class="bar"></div></div>
  </div>
  <div class="row v1">
    <div class="label">V1 · 솔리드 액센트<small>파랑 배경 + 흰 글자</small></div>
    <div class="header"><div class="bar"></div></div>
  </div>
  <div class="row v2">
    <div class="label">V2 · 틴트 액센트<small>연파랑 배경 + 파랑 글자</small></div>
    <div class="header"><div class="bar"></div></div>
  </div>
  <div class="row v3">
    <div class="label">V3 · 하단 인디케이터<small>흰 칩 + 파랑 밑줄</small></div>
    <div class="header"><div class="bar"></div></div>
  </div>
  <div class="row v4">
    <div class="label">V4 · 텍스트만 액센트<small>흰 칩 + 파랑 글자</small></div>
    <div class="header"><div class="bar"></div></div>
  </div>

<script>
  const X = '<span class="x"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span>';
  const PLUS = '<div class="plus"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>';
  const tabs = [
    {t:'홈', active:false},
    {t:'사례 관리', active:true},
    {t:'통계', active:false},
  ];
  document.querySelectorAll('.bar').forEach(bar=>{
    bar.innerHTML = tabs.map(tb=>
      `<div class="chip ${tb.active?'active':'inactive'}"><span>${tb.t}</span>${X}</div>`
    ).join('') + PLUS;
  });
</script>
</body>
</html>
