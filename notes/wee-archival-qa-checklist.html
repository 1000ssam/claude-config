<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>기록물 정리·이관 — 시각 QA 체크리스트</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --border: #e3e6ea;
    --text: #1c2024;
    --muted: #6b7280;
    --pass: #16a34a;
    --pass-bg: #e9f7ef;
    --fail: #dc2626;
    --fail-bg: #fdeaea;
    --pending: #9aa0a6;
    --accent: #2563eb;
    --accent-bg: #e8f0fe;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 120px;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 28px 20px; }

  header h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
  header p { margin: 0; font-size: 13px; color: var(--muted); }

  /* 요약 바 */
  .summary {
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
    margin: 18px 0 8px; padding: 14px 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  }
  .summary .bar { flex: 1 1 180px; height: 8px; border-radius: 999px; background: #eceef1; overflow: hidden; display: flex; min-width: 140px; }
  .summary .bar i { height: 100%; display: block; }
  .stat { font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .stat .dot { width: 9px; height: 9px; border-radius: 999px; display: inline-block; }
  .stat.pass .dot { background: var(--pass); } .stat.pass { color: var(--pass); }
  .stat.fail .dot { background: var(--fail); } .stat.fail { color: var(--fail); }
  .stat.pending .dot { background: var(--pending); } .stat.pending { color: var(--muted); }
  .stat .n { font-variant-numeric: tabular-nums; }

  /* 섹션 */
  section.group { margin-top: 20px; }
  section.group > h2 {
    font-size: 14px; font-weight: 700; margin: 0 0 10px; padding-left: 2px;
    color: var(--text);
  }
  section.group > h2 .sub { font-weight: 500; color: var(--muted); font-size: 12px; margin-left: 6px; }

  .item {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .item.s-pass { border-color: #bfe6cd; }
  .item.s-fail { border-color: #f3c9c9; }
  .item .row1 { display: flex; align-items: flex-start; gap: 12px; }
  .item .label { flex: 1; font-size: 14px; padding-top: 3px; }
  .seg { display: inline-flex; flex: 0 0 auto; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; background: #fafbfc; }
  .seg button {
    appearance: none; border: 0; background: transparent; cursor: pointer;
    font: inherit; font-size: 12px; font-weight: 600; color: var(--muted);
    padding: 6px 11px; transition: background .12s, color .12s;
    border-right: 1px solid var(--border);
  }
  .seg button:last-child { border-right: 0; }
  .seg button[aria-pressed="true"][data-v="pass"] { background: var(--pass-bg); color: var(--pass); }
  .seg button[aria-pressed="true"][data-v="fail"] { background: var(--fail-bg); color: var(--fail); }
  .seg button[aria-pressed="true"][data-v="pending"] { background: #eceef1; color: var(--text); }

  .memo {
    margin-top: 9px; width: 100%; resize: vertical; min-height: 0; height: 34px;
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px;
    font: inherit; font-size: 13px; color: var(--text); background: #fcfcfd;
  }
  .memo:focus { outline: 2px solid var(--accent-bg); border-color: var(--accent); }
  .memo.has { background: #fffdf7; border-color: #e7d8a8; }

  .overall { margin-top: 22px; }
  .overall textarea { min-height: 70px; }

  /* 하단 고정 액션 바 */
  .actionbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
  }
  .actionbar .inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
  .btn {
    appearance: none; border: 1px solid var(--border); background: var(--card);
    border-radius: 10px; padding: 10px 16px; font: inherit; font-size: 14px; font-weight: 600;
    color: var(--text); cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
    transition: background .12s, border-color .12s;
  }
  .btn:hover { background: #f3f4f6; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #1d4ed8; }
  .btn svg { width: 16px; height: 16px; }
  .btn.ghost { color: var(--muted); }
  .toast { font-size: 13px; font-weight: 600; color: var(--pass); opacity: 0; transition: opacity .2s; }
  .toast.show { opacity: 1; }
  .spacer { flex: 1; }

  details.preview { margin-top: 14px; }
  details.preview summary { cursor: pointer; font-size: 13px; color: var(--muted); font-weight: 600; }
  details.preview textarea {
    width: 100%; min-height: 220px; margin-top: 10px; font-family: ui-monospace, 'SFMono-Regular', Consolas, monospace;
    font-size: 12px; border: 1px solid var(--border); border-radius: 10px; padding: 12px; background: #fbfbfc; color: var(--text);
  }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>기록물 정리·이관 — 시각 QA 체크리스트</h1>
    <p>Wee-Story(링글) · feat/archival-records · Windows <code>npm run dev</code>에서 확인 · 각 항목 통과/실패/메모 후 하단 <b>결과 복사</b></p>
  </header>

  <div class="summary" id="summary">
    <div class="bar" id="bar"><i id="bar-pass" style="background:var(--pass)"></i><i id="bar-fail" style="background:var(--fail)"></i></div>
    <span class="stat pass"><span class="dot"></span>통과 <span class="n" id="c-pass">0</span></span>
    <span class="stat fail"><span class="dot"></span>실패 <span class="n" id="c-fail">0</span></span>
    <span class="stat pending"><span class="dot"></span>미확인 <span class="n" id="c-pending">0</span></span>
    <span class="stat" style="color:var(--muted)">총 <span class="n" id="c-total">0</span></span>
  </div>

  <main id="list"></main>

  <section class="group overall">
    <h2>전반 메모 <span class="sub">전체적인 인상·추가 발견·머지 전 코멘트</span></h2>
    <div class="item">
      <textarea class="memo" id="overall-memo" style="height:80px" placeholder="예) 전반적으로 양호. 다만 정본 PDF 표 정렬이 살짝 어긋남 — 확인 필요."></textarea>
    </div>
  </section>

  <details class="preview">
    <summary>복사될 내용 미리보기 / 직접 선택 복사</summary>
    <textarea id="preview" readonly></textarea>
    <p class="hint">복사 버튼이 막히면(브라우저 권한) 이 칸을 전체 선택(Ctrl+A) 후 복사하세요.</p>
  </details>
</div>

<div class="actionbar">
  <div class="inner">
    <button class="btn primary" id="copyBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      결과 복사
    </button>
    <span class="toast" id="toast">복사되었습니다</span>
    <span class="spacer"></span>
    <button class="btn ghost" id="resetBtn" type="button">초기화</button>
  </div>
</div>

<script>
/* ── 점검 항목 정의 (구현한 6개 영역) ──────────────────────────────── */
const SECTIONS = [
  { id: 'd1', title: 'D1 정본 상담일지 PDF', items: [
    '한글(맑은 고딕) 렌더 — 글자 깨짐(tofu) 없음',
    '부록5 서식 충실도 — 표지·목차·세션별 구성',
    '위기유형·상담대상 체크박스(☑/☐) 정확 표시',
    '세션별 페이지 분할(페이지 넘김) 정상',
    '정본 PDF 저장 / 미리보기 동작',
    '과거 세션 상담대상 자동 판별값 표시',
    '"개인메모 포함" 토글이 비고 칸에 반영',
  ]},
  { id: 'status', title: '상태 전이 UI', items: [
    '상태 드롭다운 + 적용 → DB 반영(재진입 시 유지)',
    '이관완료 후 그 학년도 세션 수정 → "원본 변경됨" 배지 점등',
    '연장 선택 시 이관희망년도 입력 + 적용',
    '이관완료 시 "이관기한 경과" 배지 해제',
  ]},
  { id: 'd5', title: 'D5 이관 패키지 출력', items: [
    '카드 선택 체크박스(기본=직전 완료 학년도 자동 체크)',
    '"이관 패키지 만들기" 바 + 선택 수 표시',
    '경고 모달(USB 잠금보관·분실 시 개인정보 유출) 표시',
    '폴더 선택 다이얼로그 동작',
    '폴더 구조: YYYY학년도_기관_상담일지/ 안 정본.pdf + MANIFEST.txt',
    '여러 철 선택 시 폴더 일괄 생성',
    '생성 후 탐색기 자동 열림',
    '정본.pdf 한글 렌더(패키지 안)',
    'MANIFEST.txt 내용(메타·SHA-256) 정상',
    'PowerShell Get-FileHash 값 = MANIFEST 데이터 줄 SHA-256 일치',
  ]},
  { id: 'd4', title: 'D4 K-에듀파인 등록 카드', items: [
    '카드별 "K-에듀파인 생산등록 정보" 접이식 펼침',
    '필드 값 정확(생산·단위과제·보존기간·기산/만료·비공개·직원열람제한·첨부 파일명)',
    '필드별 복사 버튼 동작',
    '전체 복사 버튼 동작 + 복사 완료 체크 표시',
  ]},
  { id: 'xlsx', title: 'D2/D3 목록 엑셀', items: [
    '보유목록 엑셀 저장 → 열어서 컬럼/셀 값 확인(전체 철)',
    '이관목록 엑셀 저장 → 열어서 확인(미이관 철만)',
    '이관목록의 이관희망년도(연장 철) 표시',
    '헤더 한글·맑은 고딕·열 너비 적절',
  ]},
  { id: 'd7', title: 'D7 대시보드 위젯 · 사이드바 닷', items: [
    "대시보드 '기록물 보관·이관' 위젯 카운트(경과/원본변경/연말대상)",
    '위젯 항목 클릭 → 기록물 페이지(/archival) 이동',
    '알림 없을 때 "처리할 기록물 알림이 없어요" 상태 표시',
    '사이드바 기록물 메뉴 알림 닷(경과·드리프트 > 0 시 점등)',
  ]},
];

const STORE_KEY = 'wee-archival-qa-v1';
const STATUS_LABEL = { pass: '통과', fail: '실패', pending: '미확인' };
const STATUS_ORDER = ['pass', 'fail', 'pending'];

/* 상태: { [itemId]: { status, memo } }, overall: string */
let state = load();

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore */ }
  return { items: {}, overall: '' };
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) { /* ignore */ }
}

function itemId(sec, idx) { return sec + '-' + idx; }
function getItem(id) { return state.items[id] || { status: 'pending', memo: '' }; }

/* ── 렌더 ─────────────────────────────────────────────────────────── */
const listEl = document.getElementById('list');
function render() {
  listEl.innerHTML = '';
  SECTIONS.forEach((sec) => {
    const total = sec.items.length;
    const passN = sec.items.filter((_, i) => getItem(itemId(sec.id, i)).status === 'pass').length;
    const g = document.createElement('section');
    g.className = 'group';
    g.innerHTML = '<h2>' + esc(sec.title) + ' <span class="sub">' + passN + '/' + total + ' 통과</span></h2>';
    sec.items.forEach((label, i) => {
      const id = itemId(sec.id, i);
      const it = getItem(id);
      const div = document.createElement('div');
      div.className = 'item' + (it.status === 'pass' ? ' s-pass' : it.status === 'fail' ? ' s-fail' : '');
      div.innerHTML =
        '<div class="row1">' +
          '<span class="label">' + esc(label) + '</span>' +
          '<span class="seg" role="group" aria-label="통과 여부">' +
            seg(id, 'pass', '통과', it.status) +
            seg(id, 'fail', '실패', it.status) +
            seg(id, 'pending', '미확인', it.status) +
          '</span>' +
        '</div>' +
        '<textarea class="memo' + (it.memo ? ' has' : '') + '" data-memo="' + id + '" placeholder="메모(선택) — 실패 시 무엇이 잘못됐는지 적어주세요">' + esc(it.memo) + '</textarea>';
      g.appendChild(div);
    });
    listEl.appendChild(g);
  });
  updateSummary();
  updatePreview();
}

function seg(id, v, text, cur) {
  return '<button type="button" data-id="' + id + '" data-v="' + v + '" aria-pressed="' + (cur === v) + '">' + text + '</button>';
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

/* ── 이벤트 위임 ──────────────────────────────────────────────────── */
listEl.addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-v]');
  if (!btn) return;
  const id = btn.dataset.id;
  const it = getItem(id);
  // 같은 값을 다시 누르면 미확인으로 토글
  const next = it.status === btn.dataset.v ? 'pending' : btn.dataset.v;
  state.items[id] = { status: next, memo: it.memo || '' };
  save();
  render();
});

listEl.addEventListener('input', (e) => {
  const ta = e.target.closest('textarea[data-memo]');
  if (!ta) return;
  const id = ta.dataset.memo;
  const it = getItem(id);
  state.items[id] = { status: it.status || 'pending', memo: ta.value };
  ta.classList.toggle('has', !!ta.value);
  save();
  updatePreview();
});

const overallEl = document.getElementById('overall-memo');
overallEl.value = state.overall || '';
overallEl.addEventListener('input', () => { state.overall = overallEl.value; save(); updatePreview(); });

/* ── 요약 ─────────────────────────────────────────────────────────── */
function counts() {
  let pass = 0, fail = 0, total = 0;
  SECTIONS.forEach((sec) => sec.items.forEach((_, i) => {
    total++;
    const s = getItem(itemId(sec.id, i)).status;
    if (s === 'pass') pass++; else if (s === 'fail') fail++;
  }));
  return { pass, fail, pending: total - pass - fail, total };
}
function updateSummary() {
  const c = counts();
  document.getElementById('c-pass').textContent = c.pass;
  document.getElementById('c-fail').textContent = c.fail;
  document.getElementById('c-pending').textContent = c.pending;
  document.getElementById('c-total').textContent = c.total;
  document.getElementById('bar-pass').style.width = (c.total ? (c.pass / c.total) * 100 : 0) + '%';
  document.getElementById('bar-fail').style.width = (c.total ? (c.fail / c.total) * 100 : 0) + '%';
}

/* ── 복사용 리포트 생성 ───────────────────────────────────────────── */
function buildReport() {
  const c = counts();
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  const ts = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) +
             ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  const L = [];
  L.push('# Wee-Story 기록물 정리·이관 — 시각 QA 결과');
  L.push('작성: ' + ts + '  ·  브랜치 feat/archival-records');
  L.push('요약: 통과 ' + c.pass + ' · 실패 ' + c.fail + ' · 미확인 ' + c.pending + ' (총 ' + c.total + ')');
  L.push('');
  SECTIONS.forEach((sec) => {
    L.push('## ' + sec.title);
    sec.items.forEach((label, i) => {
      const it = getItem(itemId(sec.id, i));
      let line = '- [' + STATUS_LABEL[it.status || 'pending'] + '] ' + label;
      if (it.memo && it.memo.trim()) line += '  (메모: ' + it.memo.trim() + ')';
      L.push(line);
    });
    L.push('');
  });
  L.push('## 전반 메모');
  L.push((state.overall && state.overall.trim()) ? state.overall.trim() : '(없음)');
  return L.join('\n');
}

function updatePreview() {
  document.getElementById('preview').value = buildReport();
}

/* ── 복사 ─────────────────────────────────────────────────────────── */
const toast = document.getElementById('toast');
function showToast(msg, ok) {
  toast.textContent = msg;
  toast.style.color = ok ? 'var(--pass)' : 'var(--fail)';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}
document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = buildReport();
  updatePreview();
  try {
    await navigator.clipboard.writeText(text);
    showToast('복사되었습니다 — 클로드에게 붙여넣으세요', true);
  } catch (e) {
    // 폴백: 미리보기 textarea 선택 + execCommand
    const ta = document.getElementById('preview');
    ta.closest('details').open = true;
    ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e2) { ok = false; }
    showToast(ok ? '복사되었습니다' : '자동 복사 실패 — 미리보기 칸을 직접 복사하세요', ok);
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('체크·메모를 모두 지우고 처음부터 시작할까요?')) return;
  state = { items: {}, overall: '' };
  save();
  overallEl.value = '';
  render();
});

render();
</script>
</body>
</html>
